version: 2

project_name: specops

builds:
  - id: specops
    main: ./cmd/specops
    binary: specops
    goos:
      - darwin
      - linux
    goarch:
      - amd64
      - arm64

archives:
  - id: default
    files:
      - README.md
      - install-skill.sh
      - assets/skills/**/*

checksum:
  name_template: checksums.txt
