version: 2

project_name: specops

builds:
  - id: specops
    main: ./cmd/specops
    binary: specops
    env:
      - CGO_ENABLED=0
    goos:
      - darwin
      - linux
    goarch:
      - amd64
      - arm64
    ldflags:
      - -s -w -X main.version={{ .Version }}

archives:
  - id: default
    ids:
      - specops
    name_template: >-
      {{ .ProjectName }}_
      {{- title .Os }}_
      {{- if eq .Arch "amd64" }}x86_64
      {{- else if eq .Arch "arm64" }}arm64
      {{- else }}{{ .Arch }}{{ end }}
    files:
      - README.md
      - install-skill.sh
      - assets/skills/**/*

checksum:
  name_template: specops_checksums.txt

snapshot:
  version_template: "{{ incpatch .Version }}-next"
